<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>

<body>

<h2>Matériel</h2>

<input type="text" id="nom-materiel" placeholder="Nom">
<select id="type-materiel">
  <option value="véhicule">Véhicule</option>
  <option value="arme">Arme</option>
</select>

<button id="btn-ajouter-matos">Ajouter</button>
<button id="btn-supprimer-matos">Supprimer</button>
<button id="btn-trier-matos">Trier</button>

<table border="1">
  <thead>
    <tr>
      <th>Nom</th>
      <th>Type</th>
    </tr>
  </thead>
  <tbody id="liste-materiel"></tbody>
</table>

<hr>

<h2>Carte</h2>
<div id="zone-carte" style="width:300px;height:150px;background:lightgray;cursor:pointer;">
  Clique ici
</div>
<p id="info-carte"></p>

<hr>

<h2>News</h2>
<input id="titre-news" placeholder="Titre">
<input id="contenu-news" placeholder="Contenu">
<button id="btn-ajouter-news">Ajouter news</button>
<div id="affichage-news"></div>

<hr>

<h2>Contact</h2>
<form id="formulaire-contact">
  <input id="contact-nom" placeholder="Nom"><br>
  <input id="contact-email" placeholder="Email"><br>
  <button type="submit">Envoyer</button>
</form>

<script>
let materiels = [];

function afficherMateriel() {
  let liste = document.getElementById("liste-materiel");
  liste.innerHTML = "";

  materiels.forEach(m => {
    let tr = document.createElement("tr");

    let td1 = document.createElement("td");
    td1.textContent = m.nom;

    let td2 = document.createElement("td");
    td2.textContent = m.type;

    tr.appendChild(td1);
    tr.appendChild(td2);
    liste.appendChild(tr);
  });
}

document.getElementById("btn-ajouter-matos").addEventListener("click", () => {
  let nom = document.getElementById("nom-materiel").value;
  let type = document.getElementById("type-materiel").value;

  if (!nom) return;

  materiels.push({ nom, type });
  afficherMateriel();
});

document.getElementById("btn-supprimer-matos").addEventListener("click", () => {
  materiels.pop();
  afficherMateriel();
});

document.getElementById("btn-trier-matos").addEventListener("click", () => {
  materiels.sort((a, b) => a.nom.localeCompare(b.nom));
  afficherMateriel();
});

// CARTE
document.getElementById("zone-carte").addEventListener("click", () => {
  document.getElementById("info-carte").textContent = "Zone cliquée";
});

// NEWS
let news = [];

document.getElementById("btn-ajouter-news").addEventListener("click", () => {
  let titre = document.getElementById("titre-news").value;
  let contenu = document.getElementById("contenu-news").value;

  if (!titre || !contenu) return;

  news.push({ titre, contenu });

  let div = document.getElementById("affichage-news");
  div.innerHTML = "";

  news.forEach(n => {
    let p = document.createElement("p");
    p.textContent = n.titre + " : " + n.contenu;
    div.appendChild(p);
  });
});

// CONTACT
document.getElementById("formulaire-contact").addEventListener("submit", (e) => {
  e.preventDefault();

  let nom = document.getElementById("contact-nom");
  let email = document.getElementById("contact-email");

  if (!nom.value || !email.value) {
    alert("Champs manquants");
  } else {
    alert("Message envoyé !");
  }
});
</script>

</body>
</html>
